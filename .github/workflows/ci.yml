name: CI – Lint, Build & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Restrict all jobs to read-only permissions by default
permissions:
  contents: read

jobs:
  # ==========================================
  # AUTH SERVICE TESTS
  # ==========================================
  test-auth-service:
    name: Test – auth-service
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: services/auth-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/auth-service/package-lock.json
      - run: npm ci
      - run: npm test
        env:
          JWT_SECRET: test_jwt_secret
          JWT_REFRESH_SECRET: test_refresh_secret

  # ==========================================
  # USER SERVICE TESTS (unit + load simulation)
  # ==========================================
  test-user-service:
    name: Test – user-service
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: services/user-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/user-service/package-lock.json
      - run: npm ci
      - run: npm test
        env:
          NODE_ENV: test

  # ==========================================
  # SOCIAL SERVICE TESTS (feed + behavior + load)
  # ==========================================
  test-social-service:
    name: Test – social-service
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: services/social-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/social-service/package-lock.json
      - run: npm ci
      - run: npm test
        env:
          NODE_ENV: test

  # ==========================================
  # FRONTEND BUILD
  # ==========================================
  build-frontend:
    name: Build – frontend (Next.js)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:5050/api
          NEXT_PUBLIC_CONVEX_URL: https://placeholder.convex.cloud

  # ==========================================
  # SERVICE HEALTH CHECK (smoke test)
  # ==========================================
  smoke-test-services:
    name: Smoke – service health endpoints
    runs-on: ubuntu-latest
    permissions:
      contents: read
    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.runCommand({ping:1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Install and start a service, then hit /health
      - name: Test auth-service health
        working-directory: services/auth-service
        run: |
          npm ci
          PORT=5001 MONGO_URI=mongodb://localhost:27017/test JWT_SECRET=ci_secret node index.js &
          sleep 5
          curl -f http://localhost:5001/health || exit 1
          kill %1
        env:
          NODE_ENV: smoke

      - name: Test payment-service health
        working-directory: services/payment-service
        run: |
          npm ci
          PORT=5032 MONGO_URI=mongodb://localhost:27017/test node index.js &
          sleep 5
          curl -f http://localhost:5032/health || exit 1
          kill %1

      - name: Test mini-app-service health
        working-directory: services/mini-app-service
        run: |
          npm ci
          PORT=5016 MONGO_URI=mongodb://localhost:27017/test node index.js &
          sleep 5
          curl -f http://localhost:5016/health || exit 1
          kill %1

      - name: Test developer-platform-service health
        working-directory: services/developer-platform-service
        run: |
          npm ci
          PORT=5038 MONGO_URI=mongodb://localhost:27017/test node index.js &
          sleep 5
          curl -f http://localhost:5038/health || exit 1
          kill %1

  # ==========================================
  # DOCKER BUILD VALIDATION
  # ==========================================
  docker-build:
    name: Docker – build validation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [test-auth-service, build-frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build API Gateway image
        run: |
          if [ -f api-gateway/Dockerfile ]; then
            docker build -t superapp/api-gateway:ci ./api-gateway
          fi
      - name: Build auth-service image
        run: |
          docker build -f Dockerfile.node -t superapp/auth-service:ci ./services/auth-service
