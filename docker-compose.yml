    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - PORT=5008
      - MONGO_URI=mongodb://mongodb:27017/superapp_marketplace
      - JWT_SECRET=${JWT_SECRET:-super_secret_for_super_app}
    networks:
      - superapp-network

  cart-service:
    build: ./services/cart-service
    container_name: superapp-cart
    ports:
      - "5035:5035"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - PORT=5035
      - MONGO_URI=mongodb://mongodb:27017/superapp_cart
    networks:
      - superapp-network

  order-service:
    build: ./services/order-service
    container_name: superapp-orders
    ports:
      - "5036:5036"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - PORT=5036
      - MONGO_URI=mongodb://mongodb:27017/superapp_orders
    networks:
      - superapp-network

  # ==========================================
  # 7. ON-DEMAND ECONOMY SERVICES
  # ==========================================
  ride-service:
    build: ./services/ride-service
    container_name: superapp-ride
    ports:
      - "5009:5009"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - PORT=5009
      - MONGO_URI=mongodb://mongodb:27017/superapp_rides
      - JWT_SECRET=${JWT_SECRET:-super_secret_for_super_app}
    networks:
      - superapp-network

  food-service:
    build: ./services/food-service
    container_name: superapp-food
    ports:
      - "5010:5010"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - PORT=5010
      - MONGO_URI=mongodb://mongodb:27017/superapp_food
    networks:
      - superapp-network

  hotel-service:
    build: ./services/hotel-service
    container_name: superapp-hotel
    ports:
      - "5021:5021"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - PORT=5021
      - MONGO_URI=mongodb://mongodb:27017/superapp_hotels
    networks:
      - superapp-network

  economy-service:
    build: ./services/economy-service
    container_name: superapp-economy
    ports:
      - "5022:5022"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
