  order-service:
    build:
      context: ./services/order-service
      dockerfile: ../../Dockerfile.node
    environment:
      - PORT=5036
      - MONGO_URI=mongodb://root:password@mongodb:27017/superapp?authSource=admin
    depends_on:
      - mongodb

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5050/api
    depends_on:
      - api-gateway

volumes:
  mongodb_data:
  redis_data:
