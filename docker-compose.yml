version: '3.8'

services:
  # 1. CORE DATABASES
  mongodb:
    image: mongo:6.0
    container_name: superapp-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - superapp-network

  redis:
    image: redis:7.0-alpine
    container_name: superapp-redis
    ports:
      - "6379:6379"
    networks:
      - superapp-network

  # 2. API GATEWAY (Entry point for frontend)
  api-gateway:
    build: 
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: superapp-gateway
    ports:
      - "5050:5050"
    depends_on:
      - auth-service
    environment:
      - NODE_ENV=production
      - REDIS_URL=redis://redis:6379
    networks:
      - superapp-network

  # 3. CORE MICROSERVICES
  auth-service:
    build: ./services/auth-service
    container_name: superapp-auth
    depends_on: [mongodb]
    environment:
      - MONGO_URI=mongodb://mongodb:27017/superapp
      - JWT_SECRET=super_secret_docker_key
    networks:
      - superapp-network

  social-service:
    build: ./services/social-service
    container_name: superapp-social
    depends_on: [mongodb]
    environment:
      - MONGO_URI=mongodb://mongodb:27017/superapp
    networks:
      - superapp-network

  ai-service:
    build: ./services/ai-service
    container_name: superapp-ai
    depends_on: [mongodb]
    environment:
      - MONGO_URI=mongodb://mongodb:27017/superapp
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    networks:
      - superapp-network

  ride-service:
    build: ./services/ride-service
    container_name: superapp-ride
    depends_on: [mongodb]
    environment:
      - MONGO_URI=mongodb://mongodb:27017/superapp
    networks:
      - superapp-network

  monetization-service:
    build: ./services/monetization-service
    container_name: superapp-monetization
    depends_on: [mongodb]
    environment:
      - MONGO_URI=mongodb://mongodb:27017/superapp
    networks:
      - superapp-network

  aggregator-service:
    build: ./services/aggregator-service
    container_name: superapp-aggregator
    depends_on: [mongodb, redis]
    environment:
      - MONGO_URI=mongodb://mongodb:27017/superapp
    networks:
      - superapp-network

  # Note: A real production system would list all 39 microservices here using a dynamic shell script or K8s Helm charts. 
  # This serves as our master compose architecture blueprint.

networks:
  superapp-network:
    driver: bridge

volumes:
  mongo-data:
