  # ==========================================
  # 9. MINI APP PLATFORM SERVICES
  # ==========================================
  mini-app-service:
    build: ./services/mini-app-service
    container_name: superapp-miniapp
    ports:
      - "5016:5016"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - PORT=5016
      - MONGO_URI=mongodb://mongodb:27017/superapp_miniapps
    networks:
      - superapp-network

  developer-platform-service:
    build: ./services/developer-platform-service
    container_name: superapp-developer-platform
    ports:
      - "5038:5038"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - PORT=5038
      - MONGO_URI=mongodb://mongodb:27017/superapp_developer
    networks:
      - superapp-network

  game-service:
    build: ./services/game-service
    container_name: superapp-games
    ports:
      - "5012:5012"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - PORT=5012
      - MONGO_URI=mongodb://mongodb:27017/superapp_games
    networks:
      - superapp-network

  # ==========================================
  # 10. AI & ANALYTICS SERVICES
  # ==========================================
  ai-service:
    build: ./services/ai-service
    container_name: superapp-ai
    ports:
      - "5033:5033"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - PORT=5033
      - MONGO_URI=mongodb://mongodb:27017/superapp_ai
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    networks:
      - superapp-network

  analytics-service:
    build: ./services/analytics-service
    container_name: superapp-analytics
    ports:
      - "5037:5037"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - PORT=5037
      - MONGO_URI=mongodb://mongodb:27017/superapp_analytics
    networks:
      - superapp-network

  user-activity-service:
    build: ./services/user-activity-service
    container_name: superapp-user-activity
    ports:
      - "5039:5039"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - PORT=5039
      - MONGO_URI=mongodb://mongodb:27017/superapp_user_activity
    networks:
      - superapp-network

  # ==========================================
  # 11. BUSINESS & PROFESSIONAL SERVICES
  # ==========================================
  professional-service:
    build: ./services/professional-service
    container_name: superapp-professional
    ports:
      - "5006:5006"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - PORT=5006
      - MONGO_URI=mongodb://mongodb:27017/superapp_professional
    networks:
      - superapp-network

  business-dashboard-service:
    build: ./services/business-dashboard-service
    container_name: superapp-business-dashboard
    ports:
      - "5034:5034"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - PORT=5034
      - MONGO_URI=mongodb://mongodb:27017/superapp_business
    networks:
      - superapp-network

  monetization-service:
    build: ./services/monetization-service
    container_name: superapp-monetization
    ports:
      - "5026:5026"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - PORT=5026
      - MONGO_URI=mongodb://mongodb:27017/superapp_monetization
    networks:
      - superapp-network

  # ==========================================
  # 12. PRODUCTIVITY SERVICES
  # ==========================================
  productivity-service:
    build: ./services/productivity-service
    container_name: superapp-productivity
    ports:
      - "5011:5011"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - PORT=5011
      - MONGO_URI=mongodb://mongodb:27017/superapp_productivity
    networks:
      - superapp-network

  # ==========================================
  # 13. UTILITY SERVICES
  # ==========================================
  global-search-service:
    build: ./services/global-search-service
    container_name: superapp-search
    ports:
      - "5025:5025"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - PORT=5025
      - MONGO_URI=mongodb://mongodb:27017/superapp_search
    networks:
      - superapp-network

  settings-service:
    build: ./services/settings-service
    container_name: superapp-settings
    ports:
      - "5027:5027"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - PORT=5027
      - MONGO_URI=mongodb://mongodb:27017/superapp_settings
      - JWT_SECRET=${JWT_SECRET:-super_secret_for_super_app}
    networks:
      - superapp-network

  dashboard-service:
    build: ./services/dashboard-service
    container_name: superapp-dashboard
    ports:
      - "5024:5024"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - PORT=5024
      - MONGO_URI=mongodb://mongodb:27017/superapp
    networks:
      - superapp-network

  aggregator-service:
    build: ./services/aggregator-service
    container_name: superapp-aggregator
    ports:
      - "5020:5020"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - PORT=5020
      - MONGO_URI=mongodb://mongodb:27017/superapp
      - REDIS_URL=redis://redis:6379
      - USER_ACTIVITY_SERVICE_URL=http://user-activity-service:5039
    networks:
      - superapp-network

  community-service:
    build: ./services/community-service
    container_name: superapp-community
    ports:
      - "5015:5015"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - PORT=5015
      - MONGO_URI=mongodb://mongodb:27017/superapp_community
    networks:
      - superapp-network

  discord-service:
    build: ./services/discord-service
    container_name: superapp-discord
    ports:
      - "5017:5017"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - PORT=5017
      - MONGO_URI=mongodb://mongodb:27017/superapp_discord
    networks:
      - superapp-network

  group-chat-service:
    build: ./services/group-chat-service
    container_name: superapp-group-chat
    ports:
      - "5018:5018"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - PORT=5018
      - MONGO_URI=mongodb://mongodb:27017/superapp_group_chat
    networks:
      - superapp-network

  # ==========================================
  # 14. FRONTEND (Next.js)
  # ==========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: superapp-frontend
    ports:
      - "3000:3000"
    depends_on:
      - api-gateway
    environment:
      - NEXT_PUBLIC_API_URL=http://api-gateway:5050/api
      - NODE_ENV=production
    networks:
      - superapp-network

networks:
  superapp-network:
    driver: bridge

volumes:
  mongo-data:
