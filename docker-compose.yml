version: '3.8'

services:
  # ==========================================
  # 1. CORE DATABASES
  # ==========================================
  mongodb:
    image: mongo:6.0
    container_name: superapp-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - superapp-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.0-alpine
    container_name: superapp-redis
    ports:
      - "6379:6379"
    networks:
      - superapp-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  # 2. API GATEWAY (Single entry point)
  # ==========================================
  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: superapp-gateway
    ports:
      - "5050:5050"
    depends_on:
      - auth-service
      - user-service
    environment:
      - NODE_ENV=production
      - PORT=5050
      - JWT_SECRET=${JWT_SECRET:-super_secret_for_super_app}
      - REDIS_URL=redis://redis:6379
      - AUTH_SERVICE_URL=http://auth-service:5001
      - USER_SERVICE_URL=http://user-service:5002
      - CHAT_SERVICE_URL=http://chat-service:5003
      - SOCIAL_SERVICE_URL=http://social-service:5004
      - PROFESSIONAL_SERVICE_URL=http://professional-service:5006
      - DATING_SERVICE_URL=http://dating-service:5007
      - MARKETPLACE_SERVICE_URL=http://marketplace-service:5008
      - RIDE_SERVICE_URL=http://ride-service:5009
      - FOOD_SERVICE_URL=http://food-service:5010
      - PRODUCTIVITY_SERVICE_URL=http://productivity-service:5011
      - GAME_SERVICE_URL=http://game-service:5012
      - NOTIFICATION_SERVICE_URL=http://notification-service:5013
      - DASHBOARD_SERVICE_URL=http://dashboard-service:5024
      - GLOBAL_SEARCH_SERVICE_URL=http://global-search-service:5025
      - MONETIZATION_SERVICE_URL=http://monetization-service:5026
      - SETTINGS_SERVICE_URL=http://settings-service:5027
      - SUPER_COMMUNICATION_SERVICE_URL=http://super-communication-service:5028
      - ADVANCED_INTERACTIONS_SERVICE_URL=http://advanced-interactions-service:5029
      - SNAP_SERVICE_URL=http://snap-service:5031
      - PAYMENT_SERVICE_URL=http://payment-service:5032
      - AI_SERVICE_URL=http://ai-service:5033
      - BUSINESS_DASHBOARD_SERVICE_URL=http://business-dashboard-service:5034
      - CART_SERVICE_URL=http://cart-service:5035
      - ORDER_SERVICE_URL=http://order-service:5036
      - MINI_APP_SERVICE_URL=http://mini-app-service:5016
      - DEVELOPER_PLATFORM_SERVICE_URL=http://developer-platform-service:5038
      - HOTEL_SERVICE_URL=http://hotel-service:5021
      - ECONOMY_SERVICE_URL=http://economy-service:5022
      - USER_ACTIVITY_SERVICE_URL=http://user-activity-service:5039
    networks:
      - superapp-network

  # ==========================================
  # 3. IDENTITY & AUTH SERVICES
  # ==========================================
  auth-service:
    build: ./services/auth-service
    container_name: superapp-auth
    ports:
      - "5001:5001"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - PORT=5001
      - MONGO_URI=mongodb://mongodb:27017/superapp_auth
      - JWT_SECRET=${JWT_SECRET:-super_secret_for_super_app}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-super_refresh_secret}
      - NODE_ENV=production
    networks:
      - superapp-network

  user-service:
    build: ./services/user-service
    container_name: superapp-user
    ports:
      - "5002:5002"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - PORT=5002
      - MONGO_URI=mongodb://mongodb:27017/superapp_users
      - JWT_SECRET=${JWT_SECRET:-super_secret_for_super_app}
    networks:
      - superapp-network

  # ==========================================
  # 4. COMMUNICATION SERVICES
  # ==========================================
  chat-service:
    build: ./services/chat-service
    container_name: superapp-chat
    ports:
      - "5003:5003"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - PORT=5003
      - MONGO_URI=mongodb://mongodb:27017/superapp_chat
      - JWT_SECRET=${JWT_SECRET:-super_secret_for_super_app}
      - REDIS_URL=redis://redis:6379
    networks:
      - superapp-network

  super-communication-service:
    build: ./services/super-communication-service
    container_name: superapp-super-comm
    ports:
      - "5028:5028"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - PORT=5028
      - MONGO_URI=mongodb://mongodb:27017/superapp_super_comm
      - JWT_SECRET=${JWT_SECRET:-super_secret_for_super_app}
    networks:
      - superapp-network

  notification-service:
    build: ./services/notification-service
    container_name: superapp-notifications
    ports:
      - "5013:5013"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - PORT=5013
      - MONGO_URI=mongodb://mongodb:27017/superapp_notifications
    networks:
      - superapp-network

  snap-service:
    build: ./services/snap-service
    container_name: superapp-snap
    ports:
      - "5031:5031"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - PORT=5031
      - MONGO_URI=mongodb://mongodb:27017/superapp_snap
      - JWT_SECRET=${JWT_SECRET:-super_secret_for_super_app}
    networks:
      - superapp-network

  # ==========================================
  # 5. SOCIAL & COMMUNITY SERVICES
  # ==========================================
  social-service:
    build: ./services/social-service
    container_name: superapp-social
    ports:
      - "5004:5004"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - PORT=5004
      - MONGO_URI=mongodb://mongodb:27017/superapp_social
      - JWT_SECRET=${JWT_SECRET:-super_secret_for_super_app}
    networks:
      - superapp-network

  advanced-interactions-service:
    build: ./services/advanced-interactions-service
    container_name: superapp-advanced-interactions
    ports:
      - "5029:5029"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - PORT=5029
      - MONGO_URI=mongodb://mongodb:27017/superapp_interactions
      - JWT_SECRET=${JWT_SECRET:-super_secret_for_super_app}
    networks:
      - superapp-network

  story-service:
    build: ./services/story-service
    container_name: superapp-story
    ports:
      - "5030:5030"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - PORT=5030
      - MONGO_URI=mongodb://mongodb:27017/superapp_stories
    networks:
      - superapp-network

  dating-service:
    build: ./services/dating-service
    container_name: superapp-dating
    ports:
      - "5007:5007"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - PORT=5007
      - MONGO_URI=mongodb://mongodb:27017/superapp_dating
      - JWT_SECRET=${JWT_SECRET:-super_secret_for_super_app}
    networks:
      - superapp-network

  # ==========================================
  # 6. MARKETPLACE & COMMERCE SERVICES
  # ==========================================
  marketplace-service:
    build: ./services/marketplace-service
    container_name: superapp-marketplace
    ports:
